services:
  - type: web_service
    name: diary-app
    env: docker
    branch: main
    dockerfilePath: diary_app/Dockerfile
    instanceType: starter
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      # Run SolidQueue (worker + recurring scheduler) inside the Puma process
      # so the every-minute NotificationJob runs without a separate worker service.
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
    releaseCommand: bundle exec rails db:migrate && bundle exec rails runner "load Rails.root.join('db/queue_schema.rb') unless ActiveRecord::Base.connection.table_exists?('solid_queue_jobs')"
    healthCheckPath: "/"
