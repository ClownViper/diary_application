en:
  shared:
    back_to_index: "← Back to list"
    delete_confirm: "Are you sure you want to delete?"

  activerecord:
    models:
      diary: Diary
      expense: Expense
      category: Category
      user: User
      health_log: Health Log
      book: Book
      schedule: Schedule
      push_subscription: Push Subscription
    attributes:
      diary:
        title: Title
        body: Body
        date: Date
        image: Image
      expense:
        name: Name
        amount: Amount
        date: Date
        memo: Memo
        category: Category
        category_id: Category
      category:
        name: Category Name
        color: Display Color
      health_log:
        date: Date
        weight: Weight
        condition: Condition
        memo: Memo
      book:
        title: Book Title
        author: Author
        status: Status
        started_on: Started On
        finished_on: Finished On
        memo: Review
        cover: Cover Image
      schedule:
        title: Title
        date: Date
        start_time: Start Time
        end_time: End Time
        memo: Memo
    errors:
      models:
        diary:
          attributes:
            date:
              taken: has already been registered
        health_log:
          attributes:
            date:
              taken: has already been registered
      messages:
        record_invalid: "Validation failed: %{errors}"
        blank: can't be blank
        taken: has already been taken
        not_a_number: is not a number
        greater_than: must be greater than %{count}
        invalid_hex: must be in #RRGGBB format

  errors:
    form_header:
      one: "Could not save %{model} (1 error)"
      other: "Could not save %{model} (%{count} errors)"
    messages:
      not_saved:
        one: "1 error prevented this %{resource} from being saved"
        other: "%{count} errors prevented this %{resource} from being saved"

  notifications:
    diary: "How about writing today's diary?"
    entry: "Let's record today's expenses"
    health: "Let's record today's weight and condition"
    books: "How about continuing your reading?"
    schedule: "You have an upcoming event: '%{title}'"
